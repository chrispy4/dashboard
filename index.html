<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>JSON to HTML Table</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div style="display:flex; justify-content: center; align-items: center;">
            <div style="text-align:center;width: fit-content;">
            <select id="locationFilter"></select>
            <button id="refreshBtn">Refresh Data </button>
            <div id="refreshInfo" style="text-align:center; margin:10px; font-size:50px;">
                Next update in: <span id="countdown">--</span>
            </div>
        </div>

        </div>

        <div class="table-container">
            <div>
                <h1>Not In Shop</h1>
                <table id="left-table"></table>
            </div>

            <div>
                <h1>In Shop</h1>
                <table id="right-table"></table>
            </div>
        </div>
        
        <div id="loadingOverlay">
            <div class="spinner"></div>
        </div>

        <script src="script.js"> </script>
    </body>
</html>
